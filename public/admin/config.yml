backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images"
public_folder: "/images"

site_url: https://heritage-infotech.netlify.app
display_url: https://heritageinfotech.com
logo_url: /favicon.svg

collections:
  - name: site
    label: Site Settings
    files:
      - name: settings
        label: Company Info
        file: content/site.json
        fields:
          - { label: Company Name, name: companyName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Phone, name: phone, widget: string, required: false }
          - { label: Copyright, name: copyright, widget: string }
          - label: Social Links
            name: social
            widget: object
            fields:
              - { label: LinkedIn, name: linkedin, widget: string }
              - { label: Twitter, name: twitter, widget: string }
              - { label: Facebook, name: facebook, widget: string }
              - { label: YouTube, name: youtube, widget: string }

  - name: home
    label: Home Page
    files:
      - name: homepage
        label: Homepage Content
        file: content/home.json
        fields:
          - label: Hero Slides
            name: heroSlides
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text }
              - { label: CTA Button Text, name: cta, widget: string }
              - { label: CTA Link, name: ctaLink, widget: string }
          - label: Highlights
            name: highlights
            widget: list
            field: { label: Item, name: item, widget: string }
          - label: Service Cards
            name: services
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Excerpt, name: excerpt, widget: text }
              - { label: Link, name: link, widget: string }
              - { label: Icon, name: icon, widget: string }
          - label: Call to Action
            name: cta
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text }
              - { label: Button Text, name: buttonText, widget: string }
              - { label: Button Link, name: buttonLink, widget: string }

  - name: about
    label: About Us
    files:
      - name: timeline
        label: Company Timeline
        file: content/timeline.json
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Subtitle, name: subtitle, widget: string }
          - { label: Introduction, name: intro, widget: text }
          - label: Milestones
            name: milestones
            widget: list
            fields:
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }

      - name: leadership
        label: Leadership Team
        file: content/leadership.json
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Subtitle, name: subtitle, widget: string }
          - { label: Introduction, name: intro, widget: text }
          - label: Team Members
            name: members
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Photo, name: image, widget: image, hint: "Upload to public/images/leadership/" }
              - { label: Bio, name: bio, widget: text }

  - name: industries
    label: Client Industries
    files:
      - name: all-industries
        label: All Industry Pages
        file: content/industries.json
        fields:
          - label: Healthcare
            name: healthcare
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - { label: Icon, name: icon, widget: string }
              - label: Clients
                name: clients
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Icon, name: icon, widget: image }
                  - { label: Summary, name: summary, widget: text }
                  - label: Projects
                    name: projects
                    widget: list
                    fields:
                      - { label: Area, name: area, widget: string }
                      - { label: Icon, name: icon, widget: string }
                      - { label: Description, name: description, widget: text }
          - label: Financial Services
            name: financial
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - { label: Icon, name: icon, widget: string }
              - label: Clients
                name: clients
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Icon, name: icon, widget: image }
                  - { label: Summary, name: summary, widget: text }
                  - label: Projects
                    name: projects
                    widget: list
                    fields:
                      - { label: Area, name: area, widget: string }
                      - { label: Icon, name: icon, widget: string }
                      - { label: Description, name: description, widget: text }
          - label: Technology
            name: technology
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - { label: Icon, name: icon, widget: string }
              - label: Clients
                name: clients
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Icon, name: icon, widget: image }
                  - { label: Summary, name: summary, widget: text }
                  - label: Projects
                    name: projects
                    widget: list
                    fields:
                      - { label: Area, name: area, widget: string }
                      - { label: Icon, name: icon, widget: string }
                      - { label: Description, name: description, widget: text }
          - label: Logistics
            name: logistics
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - { label: Icon, name: icon, widget: string }
              - label: Clients
                name: clients
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Icon, name: icon, widget: image }
                  - { label: Summary, name: summary, widget: text }
                  - label: Projects
                    name: projects
                    widget: list
                    fields:
                      - { label: Area, name: area, widget: string }
                      - { label: Icon, name: icon, widget: string }
                      - { label: Description, name: description, widget: text }
          - label: Government
            name: government
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - { label: Icon, name: icon, widget: string }
              - label: Clients
                name: clients
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Icon, name: icon, widget: image }
                  - { label: Summary, name: summary, widget: text }
                  - label: Projects
                    name: projects
                    widget: list
                    fields:
                      - { label: Area, name: area, widget: string }
                      - { label: Icon, name: icon, widget: string }
                      - { label: Description, name: description, widget: text }

  - name: pages
    label: Services & Contact
    files:
      - name: all-pages
        label: Vision, Services, Contact
        file: content/pages.json
        fields:
          - label: Vision Page
            name: vision
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - label: Sections
                name: sections
                widget: list
                fields:
                  - { label: Heading, name: heading, widget: string }
                  - { label: Body, name: body, widget: text }
              - label: Values
                name: values
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Icon, name: icon, widget: string }
          - label: Clients Overview
            name: clients
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Body, name: body, widget: text }
              - label: Industries
                name: industries
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Path, name: path, widget: string }
                  - { label: Icon, name: icon, widget: string }
          - label: Cybersecurity Page
            name: cyberSecurity
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Introduction, name: intro, widget: text }
              - label: Services
                name: services
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Icon, name: icon, widget: string }
              - label: Capabilities
                name: capabilities
                widget: list
                field: { label: Capability, name: capability, widget: string }
          - label: Contact Page
            name: contact
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Email, name: email, widget: string }