name: Deploy Non-Prod (Netlify)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-nonprod
  cancel-in-progress: true

jobs:
  deploy-nonprod:
    name: Deploy to heritage-infotech-nonprod
    runs-on: ubuntu-latest
    environment: nonprod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy to Netlify Non-Prod
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Non-prod deploy — ${{ github.event.head_commit.message || github.sha }}"
          enable-commit-comment: true
          enable-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_NONPROD }}
        timeout-minutes: 5