name: Deploy Non-Prod (Netlify)

on:
  # Manual only — each published non-prod deploy costs ~15 Netlify credits.
  # Push code to main freely; deploy to nonprod when you are ready to review.
  workflow_dispatch:

concurrency:
  group: deploy-nonprod
  cancel-in-progress: true

jobs:
  deploy-nonprod:
    name: Deploy to heritage-infotech-nonprod
    runs-on: ubuntu-latest
    environment: nonprod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@23.11.1

      - name: Deploy draft to Netlify Non-Prod
        id: netlify_deploy
        run: |
          DEPLOY_JSON=$(netlify deploy --dir=dist --site="${{ secrets.NETLIFY_SITE_ID_NONPROD }}" --message="Non-prod deploy — ${{ github.event.head_commit.message || github.sha }}" --json)
          echo "deploy_id=$(echo "$DEPLOY_JSON" | jq -r '.deploy_id')" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$(echo "$DEPLOY_JSON" | jq -r '.deploy_url')" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Publish to heritage-infotech-nonprod.netlify.app
        run: |
          netlify api restoreSiteDeploy \
            --data "{\"site_id\":\"${{ secrets.NETLIFY_SITE_ID_NONPROD }}\",\"deploy_id\":\"${{ steps.netlify_deploy.outputs.deploy_id }}\"}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}